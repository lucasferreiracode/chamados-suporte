<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#863bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Chip de suporte / balão de atendimento -->
  <rect x="64" y="128" width="384" height="256" rx="48" fill="url(#grad)"/>
  <path d="M192 128h128l32 64h-192z" fill="#a78bfa"/>
  <!-- Olho de verificação no balão -->
  <circle cx="256" cy="280" r="16" fill="none" stroke="#fff" stroke-width="6"/>
  <path d="M248 280l6 6 12-12" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Indicador de online / pontinho -->
  <circle cx="400" cy="352" r="16" fill="#22c55e"/>
  <circle cx="400" cy="352" r="8" fill="#fff"/>
</svg>